<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Public+Sans:wght@300;400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════════════════════════
   LETSACT DESIGN SYSTEM - CSS Variables
   ══════════════════════════════════════════════════════════════ */
:root{
  /* Colors */
  --primary: #0F2820;      /* Deep Forest - Text, Outlines */
  --paper: #F2F0E9;        /* Warm Paper - Background */
  --accent: #FF4400;       /* Signal Orange - CTAs, Highlights */
  --surface: #FFFFFF;      /* Crisp White - Cards */
  --muted: #6B706B;        /* Stone Grey - Secondary info */
  --moss: #2C5545;         /* Secondary green */
  
  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body: 'Public Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  
  /* Spacing */
  --radius: 2px;
}

html{font-size:16px;scroll-behavior:smooth}

body{
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* Noise Texture Overlay */
body::after{
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: multiply;
}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--paper)}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ══════════════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════════════ */
.app{
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 32px 96px;
}

/* Header */
header{
  margin-bottom: 48px;
  padding-bottom: 24px;
  border-bottom: 2px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 16px;
}

header h1{
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  text-transform: uppercase;
}

.timestamp{
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
}

/* Section Labels */
.section-label{
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::before{
  content: '';
  width: 8px;
  height: 8px;
  background: var(--accent);
}

/* Navigation Grid - 4 Categories */
.nav-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

@media(max-width:900px){
  .nav-grid{grid-template-columns: 1fr}
}

/* Navigation */
nav{
  background: var(--surface);
  border: 2px solid var(--primary);
  padding: 24px;
  position: relative;
}

/* File folder tab effect - now using data-label attribute */
nav::before{
  content: attr(data-label);
  position: absolute;
  top: -12px;
  left: 20px;
  background: var(--paper);
  padding: 2px 12px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--muted);
  border: 2px solid var(--primary);
  border-bottom: 2px solid var(--paper);
}

.links-grid{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.links-grid a{
  display: inline-block;
  padding: 10px 20px;
  background: var(--paper);
  color: var(--primary);
  text-decoration: none;
  border: 1px solid var(--primary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.15s ease;
}

.links-grid a:hover{
  background: var(--primary);
  color: var(--paper);
  transform: translateY(-2px);
}

.links-grid a:active{
  transform: translateY(0);
}

.no-pages{
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* Cards / Sections */
.card{
  background: var(--surface);
  border: 2px solid var(--primary);
  padding: 32px;
  margin-bottom: 32px;
  position: relative;
}

.card-title{
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--primary);
  display: flex;
  align-items: center;
  gap: 12px;
}

.card-title .number{
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent);
  letter-spacing: 0.1em;
}

/* Form Elements */
.input-group{
  margin-bottom: 20px;
}

.input-group label{
  display: block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 8px;
}

textarea{
  width: 100%;
  min-height: 120px;
  padding: 16px;
  background: var(--paper);
  border: 1px solid var(--primary);
  color: var(--primary);
  font-family: var(--font-body);
  font-size: 0.95rem;
  resize: vertical;
  transition: border-color 0.15s ease;
}

textarea:hover{
  border-color: var(--moss);
}

textarea:focus{
  outline: none;
  border-color: var(--accent);
  border-width: 2px;
}

textarea::placeholder{
  color: var(--muted);
}

textarea[readonly]{
  background: var(--surface);
  border-style: dashed;
}

/* Buttons */
.btn-row{
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

button{
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 14px 28px;
  border: 2px solid var(--primary);
  cursor: pointer;
  transition: all 0.15s ease;
}

button.primary{
  background: var(--primary);
  color: var(--paper);
}

button.primary:hover{
  background: var(--accent);
  border-color: var(--accent);
  transform: translateY(-2px);
}

button.primary:active{
  transform: translateY(0);
}

button.secondary{
  background: transparent;
  color: var(--primary);
}

button.secondary:hover{
  background: var(--primary);
  color: var(--paper);
}

button:disabled{
  opacity: 0.3;
  cursor: not-allowed;
  transform: none !important;
}

/* Converter Grid */
.converter-grid{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media(max-width:768px){
  .converter-grid{grid-template-columns:1fr}
}

.converter-grid .input-group{margin-bottom:0}

/* Stats Display */
.convert-stats{
  margin-top: 20px;
  padding: 12px 16px;
  background: var(--paper);
  border-left: 4px solid var(--accent);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: none;
}

.convert-stats.visible{display:block}
.convert-stats .stat-success{color: var(--moss)}
.convert-stats .stat-unknown{color: var(--accent)}

/* QR Output */
.qr-output{
  margin-top: 32px;
  padding-top: 32px;
  border-top: 1px solid var(--primary);
  display: none;
}

.qr-output.visible{display:block}

.qr-output h3{
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 16px;
}

.qr-canvas-wrap{
  background: var(--surface);
  padding: 24px;
  display: inline-block;
  border: 2px solid var(--primary);
}

.qr-canvas-wrap canvas{display:block}

.qr-data-preview{
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--paper);
  border: 1px solid var(--primary);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  word-break: break-all;
  max-height: 80px;
  overflow-y: auto;
}

/* Footer */
footer{
  margin-top: 64px;
  padding-top: 24px;
  border-top: 2px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

footer span{
  font-family: var(--font-mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
}

footer code{
  font-family: var(--font-mono);
  font-size: 0.65rem;
  background: var(--surface);
  border: 1px solid var(--primary);
  padding: 4px 12px;
  color: var(--primary);
}

/* Responsive */
@media(max-width:640px){
  .app{padding: 24px 16px 64px}
  header h1{font-size: 1.75rem}
  nav, .card{padding: 20px}
  .links-grid a{padding: 8px 14px; font-size: 0.65rem}
}

/* Outline Text Effect (for visual variety) */
.text-outline{
  -webkit-text-stroke: 2px var(--primary);
  color: transparent;
}
</style>
</head>

      <h1>Dashboard</h1>
    </div>
    <div class="timestamp" id="timestamp"></div>
  </header>

  <div class="nav-grid">
    <nav data-label="Misc">
      <div class="links-grid" id="nav-misc"></div>
    </nav>
    <nav data-label="Social Media">
      <div class="links-grid" id="nav-social"></div>
    </nav>
    <nav data-label="Organisations">
      <div class="links-grid" id="nav-orgs"></div>
    </nav>
    <nav data-label="Placeholder">
      <div class="links-grid" id="nav-placeholder"></div>
    </nav>
  </div>

  <!-- Slack zu Telegram Konverter -->
  <section class="card">
    <h2 class="card-title"><span class="number">01</span> Slack → Telegram Konverter</h2>
    
    <div class="converter-grid">
      <div class="input-group">

      </div>

        <label for="telegram-output">Output: Unicode Emojis</label>
        <textarea id="telegram-output" readonly placeholder="Konvertierter Text erscheint hier..."></textarea>
      </div>
    </div>

    <div class="btn-row" style="margin-top:24px">
      <button class="primary" id="convert-btn">Konvertieren</button>
      <button class="secondary" id="copy-btn" disabled>Kopieren</button>
      <button class="secondary" id="clear-convert-btn">Reset</button>
    </div>
    
    <div class="convert-stats" id="convert-stats"></div>
  </section>

  <!-- QR Code Generator -->
  <section class="card">
    <h2 class="card-title"><span class="number">02</span> QR Code Generator</h2>
    
    <div class="input-group">
      <label for="qr-input">Input: Text, URL oder Daten</label>
      <textarea id="qr-input" placeholder="https://example.com&#10;oder beliebiger Text..."></textarea>
    </div>

    <div class="btn-row">
      <button class="primary" id="generate-btn">Generieren</button>
      <button class="secondary" id="download-btn" disabled>Download PNG</button>
      <button class="secondary" id="clear-btn">Reset</button>
    </div>

    <div class="qr-output" id="qr-output">
      <h3>Output</h3>
      <div class="qr-canvas-wrap" id="qr-canvas"></div>
      <div class="qr-data-preview" id="qr-preview"></div>
    </div>
  </section>

  <footer>
    <span>Offline Dashboard — Local Use Only</span>
    <code>NAV_CATEGORIES{} @ Line 520</code>
  </footer>
</div>

function convertSlackToUnicode(text) {
  const unknown = [];
  let converted = 0;
  
  const result = text.replace(/:([a-zA-Z0-9_+-]+):/g, (match, code) => {
    const unicode = SLACK_TO_UNICODE[code.toLowerCase()];
    if (unicode) {
      converted++;
      return unicode;
    } else {
      unknown.push(code);
      return match;
    }
  });
  
  return { text: result, converted, unknown };
}

// ════════════════════════════════════════════════════════════════
// DASHBOARD INITIALIZATION
// ════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
  // Navigation Links - 4 Categories
  const navContainers = {
    misc: document.getElementById('nav-misc'),
    social: document.getElementById('nav-social'),
    orgs: document.getElementById('nav-orgs'),
    placeholder: document.getElementById('nav-placeholder'),
  };
  
  // Populate each navigation category
  Object.keys(navContainers).forEach(category => {
    const container = navContainers[category];
    const pages = NAV_CATEGORIES[category] || [];
    
    if (pages.length === 0) {
      container.innerHTML = '<span class="no-pages">No pages configured</span>';
    } else {
      pages.forEach(page => {
        const link = document.createElement('a');
        link.href = page.url;
        link.textContent = page.name;
        if (page.url.startsWith('http')) {
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
        }
        container.appendChild(link);
      });
    }
  });
  
  // Timestamp
  const now = new Date();
  document.getElementById('timestamp').textContent = now.toLocaleDateString('de-DE', {
    weekday: 'short',
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  }).toUpperCase();

  // ══════════════════════════════════════════════════════════════
  // Slack Converter
  // ══════════════════════════════════════════════════════════════
  const slackInput = document.getElementById('slack-input');
  const telegramOutput = document.getElementById('telegram-output');
  const convertBtn = document.getElementById('convert-btn');
  const copyBtn = document.getElementById('copy-btn');
  const clearConvertBtn = document.getElementById('clear-convert-btn');
  const convertStats = document.getElementById('convert-stats');

  convertBtn.addEventListener('click', function() {
    const text = slackInput.value;
    if (!text.trim()) {
      slackInput.focus();
      return;
    }
    
    const result = convertSlackToUnicode(text);
    telegramOutput.value = result.text;
    copyBtn.disabled = false;
    
    let statsHtml = `<span class="stat-success">${result.converted} converted</span>`;
    if (result.unknown.length > 0) {
      statsHtml += ` · <span class="stat-unknown">${result.unknown.length} unknown: ${result.unknown.slice(0, 5).map(c => ':' + c + ':').join(', ')}${result.unknown.length > 5 ? '...' : ''}</span>`;
    }
    convertStats.innerHTML = statsHtml;
    convertStats.classList.add('visible');
  });

  copyBtn.addEventListener('click', async function() {
    const text = telegramOutput.value;
    if (!text) return;
    
    try {
      await navigator.clipboard.writeText(text);
      const originalText = copyBtn.textContent;
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => { copyBtn.textContent = originalText; }, 1500);
    } catch (e) {
      telegramOutput.select();
      document.execCommand('copy');
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => { copyBtn.textContent = 'Kopieren'; }, 1500);
    }
  });

  clearConvertBtn.addEventListener('click', function() {
    slackInput.value = '';
    telegramOutput.value = '';
    copyBtn.disabled = true;
    convertStats.classList.remove('visible');
    slackInput.focus();
  });

  // ══════════════════════════════════════════════════════════════
  // QR Code Generator
  // ══════════════════════════════════════════════════════════════
  const input = document.getElementById('qr-input');
  const generateBtn = document.getElementById('generate-btn');
  const downloadBtn = document.getElementById('download-btn');
  const clearBtn = document.getElementById('clear-btn');
  const output = document.getElementById('qr-output');
  const canvasContainer = document.getElementById('qr-canvas');
  const preview = document.getElementById('qr-preview');
  
  let currentCanvas = null;
  
  qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];
  
  generateBtn.addEventListener('click', function() {
    const text = input.value.trim();
    if (!text) {
      input.focus();
      return;
    }
    
    try {
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      
      renderQR(qr);
      preview.textContent = text;
      output.classList.add('visible');
      downloadBtn.disabled = false;
    } catch (e) {
      alert('Error: ' + e);
    }
  });
  
  function renderQR(qr) {
    const cellSize = 8;
    const margin = 4;
    const moduleCount = qr.getModuleCount();
    const size = moduleCount * cellSize + margin * 2 * cellSize;
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = size;
    canvas.height = size;
    
    // White background
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, size, size);
    
    // Deep Forest modules (brand color)
    ctx.fillStyle = '#0F2820';
    for (let row = 0; row < moduleCount; row++) {
      for (let col = 0; col < moduleCount; col++) {
        if (qr.isDark(row, col)) {
          ctx.fillRect(
            (col + margin) * cellSize,
            (row + margin) * cellSize,
            cellSize,
            cellSize
          );
        }
      }
    }
    
    canvasContainer.innerHTML = '';
    canvasContainer.appendChild(canvas);
    currentCanvas = canvas;
  }
  
  downloadBtn.addEventListener('click', function() {
    if (!currentCanvas) return;
    
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = currentCanvas.toDataURL('image/png');
    link.click();
  });
  
  clearBtn.addEventListener('click', function() {
    input.value = '';
    output.classList.remove('visible');
    downloadBtn.disabled = true;
    currentCanvas = null;
    canvasContainer.innerHTML = '';
    preview.textContent = '';
    input.focus();
  });
  
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      generateBtn.click();
    }
  });
});
</script>
